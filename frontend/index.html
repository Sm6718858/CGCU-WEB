<!DOCTYPE html>
<html lang="en">
<head>
    <title>Web Dev</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <p>This is the main page of the management system.</p>
    <button class="logout-btn">Logout</button>

        });
