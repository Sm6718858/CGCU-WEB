<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form id="loginForm" novalidate>
        <h1 class="heading-login">Login Page</h1>
        <label for="username" class="l1">Username:</label>
        <input type="email" id="username" required>
        <small class="error" id="emailError"></small><br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" required>
        <small class="error" id="passwordError"></small><br><br>

        <button type="submit" class="submitbutton">Submit</button><br>
        <p class="successLogin"></p>
        <p class="errorLogin"></p>
        <a href="index.html">Back</a>
    </form>
<script src="script.js"></script>

</body>
</html>
